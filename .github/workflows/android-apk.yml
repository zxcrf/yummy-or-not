name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_PUBLIC_API_URL: https://yon.baobao.click

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yon/shared build 2>/dev/null || true

      # Restore android/ including .cxx/ CMake artifacts from most recent run.
      # Per-run key + restore-key fallback: always gets the latest post-build state.
      # A separate save step below uploads the updated android/ (with .cxx/) after
      # the build so the next run's CMake tasks are UP-TO-DATE and skipped entirely.
      - name: Restore android project cache
        id: cache-android
        uses: actions/cache/restore@v4
        with:
          path: apps/mobile/android
          key: android-v2-${{ runner.os }}-${{ hashFiles('apps/mobile/app.json', 'apps/mobile/package.json', 'pnpm-lock.yaml') }}-${{ github.run_id }}
          restore-keys: android-v2-${{ runner.os }}-${{ hashFiles('apps/mobile/app.json', 'apps/mobile/package.json', 'pnpm-lock.yaml') }}-

      - name: Detect Android NDK version
        id: ndk-version
        run: |
          version="$(ls "$ANDROID_HOME/ndk" | sort -V | tail -n 1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore native CMake cache (.cxx)
        id: restore-cxx
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules/react-native-gesture-handler/android/.cxx
            node_modules/react-native-reanimated/android/.cxx
          key: android-cxx-v1-${{ runner.os }}-ndk-${{ steps.ndk-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/app.json', 'apps/mobile/package.json') }}
          restore-keys: android-cxx-v1-${{ runner.os }}-ndk-${{ steps.ndk-version.outputs.version }}-

      - name: Expo prebuild (generate android/)
        working-directory: apps/mobile
        env:
          # withAmapAndroidKey reads this to write the AMap key into AndroidManifest.
          EXPO_PUBLIC_AMAP_ANDROID_SDK_KEY: ${{ secrets.AMAP_ANDROID_SDK_KEY }}
        run: test -f android/settings.gradle || pnpm exec expo prebuild --platform android --no-install

      - name: Configure release signing
        # Decode the fixed release keystore and expose its credentials as
        # user-level gradle properties. The release signingConfig itself is
        # injected into app/build.gradle by the withReleaseSigning config plugin
        # (survives prebuild regeneration); that block is guarded by
        # project.hasProperty('YON_RELEASE_STORE_FILE'), so when the secret is
        # absent (forks / PRs) the build silently falls back to debug signing.
        # A FIXED keystore is REQUIRED for the AMap SDK: its key is bound to this
        # keystore's SHA1, so an unstable signature → map white-screen.
        # (secrets context is unavailable in `if:`, so the presence check lives
        # inside the script.)
        env:
          YON_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          YON_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          YON_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          YON_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${YON_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret not set — skipping release signing (APK will be debug-signed)."
            exit 0
          fi
          # Decode OUTSIDE apps/mobile/android — that path is cached by a later
          # step, and a signing keystore must never land in GHA cache. RUNNER_TEMP
          # is per-run and discarded. storeFile uses this absolute path.
          KS="$RUNNER_TEMP/yummyornot-release.keystore"
          echo "$YON_KEYSTORE_BASE64" | base64 -d > "$KS"
          mkdir -p ~/.gradle
          {
            echo "YON_RELEASE_STORE_FILE=${KS}"
            echo "YON_RELEASE_KEY_ALIAS=${YON_KEY_ALIAS}"
            echo "YON_RELEASE_STORE_PASSWORD=${YON_STORE_PASSWORD}"
            echo "YON_RELEASE_KEY_PASSWORD=${YON_KEY_PASSWORD}"
          } >> ~/.gradle/gradle.properties

      - name: Configure Gradle properties
        # Write to ~/.gradle/gradle.properties (user-level) so android/gradle.properties
        # is never modified — keeping its content stable is critical for Gradle build
        # cache hits (any change to the file invalidates all Kotlin task inputs).
        run: |
          mkdir -p ~/.gradle
          printf 'org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError\nkotlin.daemon.jvmargs=-Xmx2g\norg.gradle.caching=true\n' \
            >> ~/.gradle/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: never

      - name: Build release APK
        working-directory: apps/mobile/android
        # -x lintVital*: skip per-library lint analysis (no value for CI APK artifact, saves ~3-4 min)
        # --stacktrace: surface root cause if org.gradle.caching=true triggers a node task failure
        run: >-
          ./gradlew :app:assembleRelease
          -x lintVitalRelease
          -x lintVitalAnalyzeRelease
          -x lintVitalReportRelease
          --stacktrace
        env:
          EXPO_PUBLIC_API_URL: https://yon.baobao.click
          # Inlined into the JS bundle during the metro bundle (assembleRelease) so
          # amapPrivacy.initAmapIfConsented passes the key to AMapSdk.init.
          EXPO_PUBLIC_AMAP_ANDROID_SDK_KEY: ${{ secrets.AMAP_ANDROID_SDK_KEY }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Save android project cache
        uses: actions/cache/save@v4
        with:
          path: apps/mobile/android
          key: android-v2-${{ runner.os }}-${{ hashFiles('apps/mobile/app.json', 'apps/mobile/package.json', 'pnpm-lock.yaml') }}-${{ github.run_id }}

      - name: Save native CMake cache (.cxx)
        if: steps.restore-cxx.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules/react-native-gesture-handler/android/.cxx
            node_modules/react-native-reanimated/android/.cxx
          key: android-cxx-v1-${{ runner.os }}-ndk-${{ steps.ndk-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/app.json', 'apps/mobile/package.json') }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
