name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_PUBLIC_API_URL: https://yon.baobao.click

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @yon/shared build 2>/dev/null || true

      # Cache the entire android/ directory including CMake build artifacts (.cxx/).
      # Key covers app.json (plugin config, SDK version) and pnpm-lock.yaml (native
      # module versions). A cache hit skips expo prebuild AND C++ recompilation —
      # the largest single time-sink in this pipeline (~5-10 min for Reanimated).
      - name: Cache android project
        id: cache-android
        uses: actions/cache@v4
        with:
          path: apps/mobile/android
          key: android-v1-${{ hashFiles('apps/mobile/app.json', 'pnpm-lock.yaml') }}

      - name: Expo prebuild (generate android/)
        if: steps.cache-android.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Configure Gradle properties
        run: |
          printf '\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError\n' \
            >> apps/mobile/android/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleRelease
        env:
          EXPO_PUBLIC_API_URL: https://yon.baobao.click
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
